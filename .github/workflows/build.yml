name: Build the Linux kernel

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
      arch:
        required: true
        type: string
      repository:
        required: true
        default: torvalds/linux
        type: string

jobs:
  draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
    steps:
      - name: Create a release
        id: create-release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: release-kvm-${{ inputs.version }}-${{ inputs.arch }}
          commit: ${{ github.sha }}
          draft: true
          name: Linux kernel ${{ inputs.version }} (${{ inputs.arch }}, KVM)
          body: "_"
          skipIfReleaseExists: true
      - run: echo ${{ steps.create-release.outputs.id }}
  build:
    runs-on: ubuntu-latest
    needs:
      - draft-release
    if: ${{ needs.draft-release.outputs.release-id != '' }}
    permissions:
      contents: write
    steps:
      - name: Check out ${{ inputs.repository }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: ${{ inputs.repository }}
          ref: v${{ inputs.version }}
      - name: Set ARCH=${{ inputs.arch }} in environment
        run: |
          echo "ARCH=${{ inputs.arch }}" >> $GITHUB_ENV
      - name: Install crossbuild-essential-arm64 package
        if: ${{ inputs.arch == 'arm64' }}
        run: |
          sudo apt-get install crossbuild-essential-arm64
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
      - name: Install crossbuild-essential-armhf package
        if: ${{ inputs.arch == 'arm' }}
        run: |
          sudo apt-get install crossbuild-essential-armhf
          echo "CROSS_COMPILE=arm-linux-gnueabihf-" >> $GITHUB_ENV
      - name: Generate Linux kernel ${{ inputs.version }} default config for ARCH=${{ inputs.arch }}
        run: make defconfig
      - name: Generate KVM guest configuration
        run: make kvm_guest.config
      - name: Build Image.gz
        if: ${{ (inputs.arch == 'x86') || (inputs.arch == 'arm64') }}
        run: |
          make -j2 Image.gz
          mv arch/${{ inputs.arch }}/boot/Image.gz Image-linux-kvm-${{ inputs.version }}-${{ inputs.arch }}.gz
      - name: Build zImage
        if: ${{ inputs.arch == 'arm' }}
        run: |
          make -j2 zImage
          mv arch/${{ inputs.arch }}/boot/zImage zImage-linux-kvm-${{ inputs.version }}-${{ inputs.arch }}
      - name: Add Image.gz to the release
        if: ${{ (inputs.arch == 'x86') || (inputs.arch == 'arm64') }}
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: release-kvm-${{ inputs.version }}-${{ inputs.arch }}
          artifacts: Image-linux-kvm-${{ inputs.version }}-${{ inputs.arch }}.gz
          omitName: true
          omitBody: true
          allowUpdates: true
          updateOnlyUnreleased: true
      - name: Add zImage to the release
        if: ${{ inputs.arch == 'arm' }}
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: release-kvm-${{ inputs.version }}-${{ inputs.arch }}
          artifacts: zImage-linux-kvm-${{ inputs.version }}-${{ inputs.arch }}
          omitName: true
          omitBody: true
          allowUpdates: true
          updateOnlyUnreleased: true

